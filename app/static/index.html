<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미드미 — 1인 기업 OS</title>
    <meta name="description" content="AI 에이전트 10명이 함께 일하는 1인 기업 운영 시스템">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏢</text></svg>">
</head>
<body>
    <div class="app-layout">

        <!-- ══════════════════════════════════════
             좌측 사이드바: 에이전트 목록
             ══════════════════════════════════════ -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="brand">
                    <div class="brand-logo">🏢</div>
                    <div class="brand-info">
                        <h1>미드미</h1>
                        <span>1인 기업 OS</span>
                    </div>
                </div>
            </div>

            <div class="sidebar-section">
                <!-- CEO 모드 버튼 -->
                <div class="agent-item active" id="ceoModeBtn" data-id="" style="margin-bottom:8px;border:1px solid var(--border);background:var(--bg-card)">
                    <span class="agent-emoji">🧭</span>
                    <div class="agent-info">
                        <div class="agent-name" style="color:var(--agent-ceo)">CEO 자동 분배</div>
                        <div class="agent-title">명령을 분석하여 적절한 에이전트에게 분배</div>
                    </div>
                </div>

                <div class="section-label">에이전트</div>
                <div id="agentList">
                    <!-- JS가 채움 -->
                </div>
            </div>

            <!-- GitHub 동기화 상태 -->
            <div class="ollama-status" id="gitSyncBar" style="border-bottom:1px solid var(--border)">
                <div class="status-dot" id="gitStatus"></div>
                <span id="gitStatusText">GitHub 확인 중...</span>
                <button class="btn-sm btn-save" id="syncBtn" onclick="App.syncGithub()" style="margin-left:auto;padding:4px 10px;font-size:10px">
                    🔄 동기화
                </button>
            </div>

            <!-- Ollama 상태 -->
            <div class="ollama-status">
                <div class="status-dot" id="ollamaStatus"></div>
                <span id="ollamaStatusText">연결 확인 중...</span>
                <select class="model-select" id="modelSelect">
                    <option>로딩 중...</option>
                </select>
            </div>
        </aside>

        <!-- ══════════════════════════════════════
             중앙: 채팅 영역
             ══════════════════════════════════════ -->
        <main class="main-area">
            <div class="main-header">
                <h2>💬 채팅</h2>
                <span class="target-badge" id="targetBadge" style="display:none"></span>
                <span class="mode-indicator" id="modeIndicator">🧭 CEO 자동 분배</span>
            </div>

            <!-- 채팅 메시지 컨테이너 -->
            <div class="chat-container" id="chatContainer">
                <!-- Welcome Screen -->
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-logo">🏢</div>
                    <div class="welcome-title">미드미 1인 기업 OS</div>
                    <div class="welcome-sub">
                        10명의 AI 에이전트가 당신의 사업을 도와드립니다.<br>
                        아래 힌트를 클릭하거나, 직접 명령을 입력하세요.
                    </div>
                    <div class="welcome-hints">
                        <div class="hint-card" data-msg="이번 주 할 일을 정리해줘">
                            <span class="hint-emoji">📋</span>
                            <span>이번 주 할 일을 정리해줘</span>
                        </div>
                        <div class="hint-card" data-msg="유튜브 영상 기획서를 만들어줘">
                            <span class="hint-emoji">📺</span>
                            <span>유튜브 영상 기획서를 만들어줘</span>
                        </div>
                        <div class="hint-card" data-msg="경쟁사 분석을 해줘">
                            <span class="hint-emoji">🔍</span>
                            <span>경쟁사 분석을 해줘</span>
                        </div>
                        <div class="hint-card" data-msg="인스타그램 콘텐츠 전략을 세워줘">
                            <span class="hint-emoji">📷</span>
                            <span>인스타그램 콘텐츠 전략을 세워줘</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 입력 영역 -->
            <div class="chat-input-area">
                <div class="input-wrapper">
                    <textarea
                        class="chat-input"
                        id="chatInput"
                        placeholder="에이전트에게 명령을 내리세요... (Shift+Enter: 줄바꿈)"
                        rows="1"
                    ></textarea>
                    <button class="send-btn" id="sendBtn" title="전송 (Enter)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 2L11 13"></path>
                            <path d="M22 2L15 22L11 13L2 9L22 2Z"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </main>

        <!-- ══════════════════════════════════════
             우측 패널: 에이전트 상세 / 세션 / 메모리
             ══════════════════════════════════════ -->
        <aside class="right-panel">
            <div class="panel-tabs">
                <button class="panel-tab active" data-tab="agent">에이전트</button>
                <button class="panel-tab" data-tab="sessions">세션</button>
                <button class="panel-tab" data-tab="memory">메모리</button>
            </div>
            <div class="panel-content">
                <!-- 에이전트 상세 -->
                <div id="agentDetail">
                    <div style="text-align:center;padding:40px;color:var(--text-muted);font-size:13px">
                        좌측에서 에이전트를 선택하세요
                    </div>
                </div>

                <!-- 세션 히스토리 -->
                <div id="sessionList" style="display:none">
                    <!-- JS가 채움 -->
                </div>

                <!-- 공유 메모리 -->
                <div id="sharedMemory" style="display:none">
                    <!-- JS가 채움 -->
                </div>
            </div>
        </aside>

    </div>

    <!-- JS 로드 순서 중요 -->
    <script src="/static/js/chat.js"></script>
    <script src="/static/js/agents.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
